<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="color-scheme" content="light">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboQuiz: Выбор класса</title>
    <style>
:root {
    --bg: #e0f7fa;
    --card: #ffffff;
    --primary: #ff9800;
    --success: #8bc34a;
    --error: #ff5252;
    --text: #333333;
    --border: #ffd54f;
}
#quiz-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
    border-radius: 44px 44px 0 0;
    pointer-events: none;
}

/* КРИТИЧЕСКИ ВАЖНЫЙ БЛОК ПРОТИВ ИНВЕРСИИ */
img, .result-anim, .frog-anim, .butterfly-anim {
    /* Это свойство говорит браузеру: "Я светлый, не инвертируй меня!" */
    color-scheme: light !important;
    /* Убирает любые фильтры, которые накладывает браузер */
    filter: invert(0) !important;
    /* Отключает умное смешивание цветов */
    mix-blend-mode: normal !important;
}

body {
    /* Красочный градиент */
    background: linear-gradient(-45deg, #e0f7fa, #fff9c4, #f1f8e9, #e1f5fe);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;

    color: var(--text);
    font-family: 'Segoe UI Round', 'Ubuntu', 'Comic Sans MS', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
}

/* Анимация перелива фона */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Скрываем всё лишнее */
.bg-container, .grid, .sphere { display: none !important; }

#quiz-card {
    background: var(--card);
    /* Двойная рамка: желтая внешняя и тонкая белая внутренняя для объема */
    border: 6px solid var(--border);
    outline: 4px solid #ffffff;
    outline-offset: -10px;

    padding: 35px;
    border-radius: 50px; /* Еще более круглые углы */
    width: 90%;
    max-width: 500px;

    /* Сочная тень снизу создает эффект полета */
    box-shadow:
        0 20px 0px #ffd54f,
        0 30px 50px rgba(0,0,0,0.1);

    z-index: 10;
    position: relative;

    /* Легкий градиент внутри карточки */
    background: linear-gradient(135deg, #ffffff 0%, #fffde7 100%);
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Красивая подложка для счетчика очков */
#score-display {
    background: #fff3e0;
    padding: 5px 15px;
    border-radius: 15px;
    color: #e65100;
    border: 2px solid #ffcc80;
}

/* Подложка для номера вопроса */
#progress {
    color: #0097a7;
    font-weight: 800;
}

.question {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 30px;
    text-align: center;
    /* Градиентный текст для вопроса */
    background: linear-gradient(45deg, #00796b, #004d40);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.class-select {
    display: flex;
    flex-direction: row;
    gap: 10px;
    grid-column: span 2;
}

button {
    background: #fff;
    border: 3px solid #f0f0f0;
    color: #333;
    padding: 20px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
    transition: all 0.2s ease;
    position: relative;
    overflow: visible !important;
}

button:hover:not(:disabled) {
    transform: scale(1.03);
    background: #fff9c4;
}

/* --- НОВЫЙ БЛОК ДЛЯ АНИМИРОВАННЫХ ЭМОДЗИ --- */
.emoji-anim {
    position: absolute;
    font-size: 45px; /* Размер стикера */
    top: -40px;      /* Насколько высоко он вылетает */
    right: -10px;
    display: none;   /* Скрыт, пока не ответили */
    pointer-events: none;
    z-index: 100;
    /* Сбрасываем любые фильтры, чтобы эмодзи были яркими */
    filter: none !important;
}

/* Когда ответ верный — показываем лягушку */
button.correct .emoji-anim.frog {
    display: block;
    animation: jump-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

/* Когда ответ неверный — показываем бабочку */
button.wrong .emoji-anim.butterfly {
    display: block;
    animation: jump-in 0.6s ease-out forwards;
}

/* Анимация прыжка */
@keyframes jump-in {
    0% { transform: scale(0) translateY(30px) rotate(-20deg); opacity: 0; }
    50% { transform: scale(1.4) translateY(-15px) rotate(10deg); }
    100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
}

button.correct { background: var(--success) !important; color: white !important; border-color: #689f38 !important; }
button.wrong { background: var(--error) !important; color: white !important; border-color: #d32f2f !important; }

.action-btn {
    background: var(--primary);
    color: white;
    border: none;
    width: 100%;
    font-weight: 900;
    display: none;
    margin-top: 20px;
    padding: 18px;
    border-radius: 25px;
    box-shadow: 0 6px 0 #e65100;
}
/* Декоративные плавающие круги */
.bg-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    z-index: 1;
    opacity: 0.5;
    animation: float 10s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-40px) rotate(20deg); }
}

#skip-btn {
    background: #ffcc00;
    color: #333;
    box-shadow: 0 6px 0 #c6a700;
    margin-top: 10px;
}

.result-bar-container {
    width: 100%; height: 20px; background: #eee; border-radius: 15px; margin: 25px 0; overflow: hidden; border: 2px solid #ddd;
}
.result-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 1.5s ease; }
</style>
</head>

    function playTone(freq, type, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startQuiz(grade) {
    audioCtx.resume();

    // Настраиваем диапазоны под твой новый большой список
    if (grade === 5) {
        // Теперь 5 класс — это первые 166 вопросов
        currentQuestions = pool.slice(0, 166);
    } else if (grade === 6) {
        // Допустим, 6 класс — это следующие 50 вопросов
        currentQuestions = pool.slice(166, 333);
    } else {
        // 7 класс — всё остальное
        currentQuestions = pool.slice(333, 500);
    }

    // Если в выбранном классе вопросов меньше 20, берем сколько есть
    let count = Math.min(currentQuestions.length, 20);

    currentQuestions = currentQuestions.sort(() => 0.5 - Math.random()).slice(0, count);
    currentIdx = 0;
    score = 0;

    // Сбрасываем UI очков, если это новый старт
    document.getElementById('score-display').innerText = `ОЧКИ: 0`;

    loadQuestion();
}

    function loadQuestion() {
    const qData = currentQuestions[currentIdx];
    const container = document.getElementById('options');
    document.getElementById('progress').innerText = `ВОПРОС ${currentIdx + 1} / 20`;
    document.getElementById('q-text').innerText = qData.q;
    document.getElementById('confirm-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'block';
    selectedBtn = null;
    container.innerHTML = '';

    [qData.a, ...qData.o].sort(() => Math.random() - 0.5).forEach(text => {
            const btn = document.createElement('button');

            // Вставляем текст вопроса и два "спящих" эмодзи
            btn.innerHTML = `
                <span>${text}</span>
                <span class="emoji-anim frog">🐸</span>
                <span class="emoji-anim butterfly">🦋</span>
            `;

            btn.onclick = () => {
                document.querySelectorAll('#options button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedBtn = btn;
                document.getElementById('confirm-btn').style.display = 'block';
                playTone(600, 'sine', 0.05, 0.01);
            };
            container.appendChild(btn);
        });
}

    function confirmAnswer() {
        const qData = currentQuestions[currentIdx];
        const buttons = document.querySelectorAll('#options button');
        document.getElementById('confirm-btn').style.display = 'none';
        document.getElementById('skip-btn').style.display = 'none';
        buttons.forEach(b => b.disabled = true);
        if (selectedBtn.innerText === qData.a) {
            score++; selectedBtn.classList.add('correct');
            playTone(880, 'sine', 0.1, 0.01);
        } else {
            selectedBtn.classList.add('wrong');
            buttons.forEach(b => { if(b.innerText === qData.a) b.classList.add('correct'); });
            playTone(220, 'triangle', 0.1, 0.01);
        }
        document.getElementById('score-display').innerText = `ОЧКИ: ${score}`;
        document.getElementById('next-btn').style.display = 'block';
    }
    function skipQuestion() {
    const qData = currentQuestions[currentIdx];
    const buttons = document.querySelectorAll('#options button');

    document.getElementById('confirm-btn').style.display = 'none';
    document.getElementById('skip-btn').style.display = 'none';

    buttons.forEach(b => {
        b.disabled = true;
        if (b.innerText === qData.a) {
            b.classList.add('correct'); // Тут появится лягушка
        }
    });

    playTone(440, 'sine', 0.05, 0.01);
    document.getElementById('next-btn').style.display = 'block';
}
    function nextQuestion() {
        currentIdx++;
        if (currentIdx < 20) loadQuestion();
        else showResults();
    }

    function showResults() {
        const percent = Math.round((score / 20) * 100);
        document.getElementById('quiz-card').innerHTML = `
            <div style="text-align:center">
                <div class="header">ТЕСТ ЗАВЕРШЕН</div>
                <div style="font-size: 64px; font-weight: 900; color: var(--primary); margin: 10px 0;">${score} / 20</div>

                <div class="result-bar-container">
                    <div id="final-bar" class="result-bar-fill"></div>
                </div>

                <p style="margin-bottom: 30px; opacity: 0.8; font-size: 18px;">
                    Ваш результат: <b>${percent}%</b>
                </p>
                <button onclick="location.reload()" style="width:100%">ЗАНОВО</button>
            </div>
        `;

        // Запускаем анимацию полоски
        setTimeout(() => {
            const bar = document.getElementById('final-bar');
            if(bar) bar.style.width = percent + '%';
        }, 100);
    }
</script>
